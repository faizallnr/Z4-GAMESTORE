<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z4 Gamestore - Top Up Game Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Animasi transisi konten agar perpindahan tab terasa smooth */
        .tab-content {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        .tab-content.active {
            display: block;
            opacity: 1;
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans relative min-h-screen flex flex-col justify-between">

    <div class="fixed inset-0 bg-[url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1470&auto=format&fit=crop')] bg-cover bg-center opacity-15 pointer-events-none -z-10"></div>

    <nav class="bg-slate-800/90 backdrop-blur border-b border-slate-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20 gap-2">
                <div class="flex-shrink-0">
                    <button onclick="switchTab('beranda')" class="text-xl sm:text-2xl font-extrabold text-violet-400 tracking-wider font-mono focus:outline-none whitespace-nowrap">
                        Z4 <span class="text-cyan-400">Gamestore</span>
                    </button>
                </div>
                
                <div class="hidden md:flex space-x-1 bg-slate-950/60 p-1.5 rounded-xl border border-slate-700/50">
                    <button onclick="switchTab('beranda')" id="nav-beranda" class="nav-btn bg-cyan-500 text-slate-900 px-4 py-2 rounded-lg text-sm font-bold transition duration-200">
                        <i class="fa-solid fa-house mr-1.5"></i>Beranda
                    </button>
                    <button onclick="switchTab('periksa')" id="nav-periksa" class="nav-btn text-gray-400 hover:text-white hover:bg-slate-800 px-4 py-2 rounded-lg text-sm font-medium transition duration-200">
                        <i class="fa-solid fa-magnifying-glass mr-1.5"></i>Periksa Pesanan
                    </button>
                    <button onclick="switchTab('reseller')" id="nav-reseller" class="nav-btn text-gray-400 hover:text-white hover:bg-slate-800 px-4 py-2 rounded-lg text-sm font-medium transition duration-200">
                        <i class="fa-solid fa-handshake mr-1.5"></i>Gabung Reseller
                    </button>
                    <a href="https://www.instagram.com/faizallnr" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-pink-400 hover:bg-slate-800 px-4 py-2 rounded-lg text-sm font-medium transition duration-200 flex items-center">
                        <i class="fa-brands fa-instagram mr-1.5 text-pink-500"></i>Hubungi Kami
                    </a>
                </div>

                <div class="flex-shrink-0">
                    <button onclick="toggleAuthModal(true)" class="bg-slate-950 hover:bg-slate-900 text-cyan-400 border border-cyan-500/30 font-bold px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl text-xs sm:text-sm transition duration-300 flex items-center gap-1.5 sm:gap-2 shadow-lg shadow-cyan-500/5">
                        <i class="fa-solid fa-user-astronaut text-sm sm:text-base"></i><span>Masuk</span>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="md:hidden fixed bottom-0 left-0 right-0 bg-slate-800/95 backdrop-blur border-t border-slate-700 z-50 py-2 px-4 flex justify-around shadow-2xl">
            <button onclick="switchTab('beranda')" id="mob-beranda" class="mob-btn flex flex-col items-center gap-0.5 text-cyan-400 font-bold">
                <i class="fa-solid fa-house text-lg"></i><span class="text-[10px]">Beranda</span>
            </button>
            <button onclick="switchTab('periksa')" id="mob-periksa" class="mob-btn flex flex-col items-center gap-0.5 text-gray-400">
                <i class="fa-solid fa-magnifying-glass text-lg"></i><span class="text-[10px]">Periksa</span>
            </button>
            <button onclick="switchTab('reseller')" id="mob-reseller" class="mob-btn flex flex-col items-center gap-0.5 text-gray-400">
                <i class="fa-solid fa-handshake text-lg"></i><span class="text-[10px]">Reseller</span>
            </button>
            <a href="https://www.instagram.com/faizallnr" target="_blank" rel="noopener noreferrer" class="flex flex-col items-center gap-0.5 text-gray-400">
                <i class="fa-brands fa-instagram text-lg text-pink-500"></i><span class="text-[10px]">Kontak</span>
            </a>
        </div>
    </nav>

        <div id="tab-beranda" class="tab-content active space-y-8">
